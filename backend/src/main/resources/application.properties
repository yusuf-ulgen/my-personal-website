# --- SUNUCU AYARLARI ---
spring.application.name=website
server.port=${PORT:8085}
spring.main.allow-bean-definition-overriding=true
# lazy-initialization KAPATILDI: Cold start sirasinda bean'ler hazir olmayinca 500 donuyordu
spring.main.lazy-initialization=false


# --- POSTGRESQL VERİTABANI BAĞLANTISI ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/website_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HikariCP Bağlantı Havuzu (Render Free Tier için optimize) ---
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# --- HIBERNATE VE JPA ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --- E-POSTA AYARLARI ---
brevo.api.key=${BREVO_API_KEY}
mail.from.email=${MAIL_FROM:ysfulgen142@gmail.com}

# JWT Şifreleme Anahtarı
jwt.secret=${JWT_SECRET:yusuf_ulgen_cok_gizli_ozel_anahtar_2026_backend_test_key_123456}

# Token'ın geçerlilik süresi (Milisaniye cinsinden. 86400000 = 1 Gün)
jwt.expiration=86400000

# (Varsayılan Spring Security girişini kapatıyoruz çünkü kendi JWT Login'imizi yazacağız)
spring.security.user.name=${ADMIN_USERNAME:root}
spring.security.user.password=${ADMIN_PASSWORD:root}